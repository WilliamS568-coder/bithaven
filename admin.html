<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit Haven Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0b0b0b;
            color: white;
        }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-green-400 mb-6">
        Bit Haven Admin Panel
    </h1>

    <div class="bg-zinc-900 p-4 rounded-xl mb-6 border border-zinc-800">
        <h2 class="text-xl mb-4 text-zinc-300 font-semibold">Update User Balance Manually</h2>
        <div class="flex flex-col md:flex-row gap-3">
            <input id="phone" placeholder="User Phone Number" class="w-full p-3 rounded bg-zinc-800 border border-zinc-700 text-white">
            <input id="balance" type="number" placeholder="New Balance Amount" class="w-full p-3 rounded bg-zinc-800 border border-zinc-700 text-white">
            <button onclick="updateBalance()" class="bg-green-500 text-black font-bold px-6 py-3 rounded hover:bg-green-400 transition-colors whitespace-nowrap">
                Update Balance
            </button>
        </div>
    </div>

    <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
        <h2 class="text-xl mb-4 font-semibold text-zinc-300">User Management & Verification Log</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-zinc-700 text-zinc-400 text-sm">
                        <th class="p-3">User Phone</th>
                        <th class="p-3">Core Balance</th>
                        <th class="p-3">Affiliate Earnings</th>
                        <th class="p-3">Pending/Recent Transactions</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let allUsers = [];

    // 1. Load users and transaction bills array dynamically from database
    async function fetchUsers() {
        try {
            const response = await fetch('/api/admin/users');
            const result = await response.json();
            if (result.success) {
                allUsers = result.users;
                renderUsers(allUsers);
            } else {
                alert("Failed to load user accounts database stream.");
            }
        } catch (err) {
            console.error("Database connection failure:", err);
        }
    }

    // 2. Process and render table layout including verification rows
    function renderUsers(users) {
        let html = '';
        users.forEach(user => {
            let userBillsHtml = '';
            
            // Check if bills array holds items
            if (user.bills && user.bills.length > 0) {
                userBillsHtml = `<div class="space-y-3">`;
                user.bills.forEach(bill => {
                    const statusColor = bill.status === 'Approved' ? 'text-green-400' : 'text-amber-400 font-bold';
                    
                    userBillsHtml += `
                        <div class="bg-zinc-800 p-3 rounded border border-zinc-700 text-xs">
                            <div class="flex justify-between mb-1">
                                <span class="text-zinc-400">ID: ${bill.id}</span>
                                <span class="${statusColor}">${bill.status}</span>
                            </div>
                            <div class="mb-2">Amount: <b class="text-white text-sm">₦${Number(bill.amount).toLocaleString()}</b></div>
                            <div class="flex gap-2">
                                ${bill.proof_link ? `<a href="${bill.proof_link}" target="_blank" class="bg-blue-600 text-white px-2 py-1 rounded text-[11px] hover:bg-blue-500">View Receipt</a>` : '<span class="text-zinc-500">No Image Attachment</span>'}
                                ${bill.status !== 'Approved' ? `<button onclick="approveRecharge('${user.phone}', '${bill.id}')" class="bg-emerald-500 text-black font-bold px-2 py-1 rounded text-[11px] hover:bg-emerald-400">Approve Money</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                userBillsHtml += `</div>`;
            } else {
                userBillsHtml = `<span class="text-zinc-500 italic text-xs">No transactions recorded</span>`;
            }

            html += `
                <tr class="border-b border-zinc-800 hover:bg-zinc-900/50 transition-colors">
                    <td class="p-3 font-mono text-green-400">${user.phone}</td>
                    <td class="p-3 font-semibold">₦${Number(user.balance || 0).toLocaleString()}</td>
                    <td class="p-3 text-zinc-400">₦${Number(user.earnings || 0).toLocaleString()}</td>
                    <td class="p-3 w-1/3">${userBillsHtml}</td>
                </tr>
            `;
        });
        document.getElementById('usersTable').innerHTML = html;
    }

    // 3. Action function mapping to process verification approvals natively
    async function approveRecharge(phone, billId) {
        if (!confirm("Are you sure you want to approve this deposit receipt and credit the user?")) return;

        try {
            const response = await fetch('/api/admin/approve-recharge', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    phone: phone,
                    billId: billId
                })
            });

            const result = await response.json();

            if (result.success) {
                alert("Receipt approved successfully! User balance credited.");
                fetchUsers(); // Instantly re-render dashboard grid UI updates
            } else {
                alert("Approval execution issue: " + result.message);
            }
        } catch (err) {
            console.error(err);
            alert("Network communications fail line on handler routine.");
        }
    }

    // 4. Fallback handler route for explicit manual balance management overrides
    async function updateBalance() {
        const phone = document.getElementById('phone').value.trim();
        const balance = Number(document.getElementById('balance').value);

        if (!phone) {
            alert("Please input a reference account mobile track number.");
            return;
        }

        try {
            const response = await fetch('/api/admin/update-balance', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone, balance })
            });

            const result = await response.json();
            if (result.success) {
                alert("Account base transaction balance set modified.");
                document.getElementById('phone').value = '';
                document.getElementById('balance').value = '';
                fetchUsers();
            } else {
                alert("Error setting manually override value: " + result.message);
            }
        } catch (err) {
            console.error(err);
            alert("Communication framework failed tracking post request block.");
        }
    }

    // Initial load on panel ready execution lifecycle loop
    fetchUsers();
</script>

</body>
</html>
